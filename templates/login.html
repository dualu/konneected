<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerhouse Enterprise - Secure Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            /* Sleek industrial dark background */
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6); width: 100%; max-width: 420px;
            text-align: center;
        }
        /* Adjusted container for the real company logo image */
        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Prevents the image from stretching out of shape */
        }
        h2 { color: #1e293b; margin-bottom: 5px; font-weight: 700; letter-spacing: -0.5px;}
        p { color: #64748b; margin-bottom: 30px; font-size: 15px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #475569; font-size: 14px; font-weight: 600; }
        .input-group input {
            width: 100%; padding: 14px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 16px; outline: none; transition: all 0.3s;
            background: #f8fafc;
        }
        .input-group input:focus { border-color: #2563eb; background: white; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }
        
        button {
            width: 100%; padding: 14px; background: #2563eb; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        button:hover { background: #1d4ed8; }
        
        /* This styles the error message if they type the wrong password */
        .flash-message { 
            color: #dc2626; background: #fee2e2; padding: 12px; 
            border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 600; border: 1px solid #f87171;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='company_logo.png') }}" alt="Konnected Liberia Logo">
        </div>
        
        <h2>Konnected Liberia</h2>
        <p>Secure Facility Asset Manager</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>System Username</label>
                <input type="text" name="username" required autocomplete="off" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Security Credential</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit">Authenticate User</button>
        </form>
    </div>

</body>
</html>
